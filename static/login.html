<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - نظام التسوية البنكية الآلية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0f2c4d;--navy2:#1f4e78;--teal:#0e9b8e;--bg:#f4f7fb;--line:#e3e9f2;--ink:#1c2b3a;--mut:#6b7c93;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;min-height:100vh;display:grid;place-items:center}
  .login-box{background:#fff;border-radius:18px;padding:34px;width:360px;box-shadow:0 20px 50px rgba(0,0,0,.2);color:var(--ink)}
  .logo{width:44px;height:44px;border-radius:12px;background:var(--teal);display:grid;place-items:center;font-weight:800;font-size:20px;color:#fff;margin:0 auto 14px}
  h2{text-align:center;color:var(--navy);margin-bottom:4px}
  .sub{text-align:center;color:var(--mut);font-size:13px;margin-bottom:22px}
  label{font-size:13px;font-weight:500;color:var(--mut);display:block;margin-bottom:6px}
  input{width:100%;padding:11px;border:1px solid #e3e9f2;border-radius:10px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink);margin-bottom:12px}
  .btn{width:100%;padding:14px;border:0;border-radius:12px;background:var(--teal);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
  .btn:hover{background:#0c8579}
  .hint{margin-top:16px;font-size:11.5px;color:var(--mut);text-align:center;line-height:1.8}
  .err{background:#fdecef;color:#d2415a;padding:12px;border-radius:10px;font-size:13px;margin-top:14px;display:none}
  .err.visible{display:block}
</style>
</head>
<body>
  <div class="login-box">
    <div class="logo">ت</div>
    <h2>نظام التسوية البنكية الآلية</h2>
    <div class="sub">سجّل الدخول للمتابعة</div>
    <label>اسم المستخدم</label>
    <input id="u" autocomplete="username" autofocus>
    <label>كلمة المرور</label>
    <input id="p" type="password" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">دخول</button>
    <div id="loginErr" class="err"></div>
    <div class="hint">حسابات تجريبية:<br>admin / admin123 — supervisor / super123 — entry / entry123</div>
  </div>
  <script>
    const TOKEN_KEY = 'taswiya_token';
    async function doLogin(){
      const user = document.getElementById('u').value.trim();
      const pass = document.getElementById('p').value;
      const err = document.getElementById('loginErr');
      const btn = document.querySelector('.btn');
      err.classList.remove('visible'); err.textContent='';
      if(!user||!pass){err.textContent='يرجى إدخال اسم المستخدم وكلمة المرور';err.classList.add('visible');return;}
      btn.disabled=true; btn.textContent='جارٍ الدخول...';
      try{
        const fd = new FormData();
        fd.append('username', user);
        fd.append('password', pass);
        const res = await fetch('/login',{method:'POST', body: fd});
        if(!res.ok){
          const data = await res.json().catch(()=>({detail: res.status>=500 ? 'خطأ في الخادم — يرجى المحاولة مجدداً' : 'فشل الاتصال'}));
          err.textContent = data.detail || 'فشل تسجيل الدخول';
          err.classList.add('visible');
          return;
        }
        const data = await res.json();
        localStorage.setItem(TOKEN_KEY, data.token);
        location.href = '/app';
      }catch(e){
        err.textContent = 'تعذّر الاتصال بالخادم — تحقق من اتصالك بالإنترنت';
        err.classList.add('visible');
      }finally{
        btn.disabled=false; btn.textContent='دخول';
      }
    }
    document.getElementById('p').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  </script>
</body>
</html>
